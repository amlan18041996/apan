<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E84142"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#E84142" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Compact bag icon -->
  <g filter="url(#shadow)">
    <rect x="8" y="16" width="50" height="56" rx="10" ry="10" fill="url(#iconGrad)"/>
    <path d="M18 16 V10 C18 6 23 3 33 3 C43 3 48 6 48 10 V16" fill="none" stroke="url(#iconGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M28 50 L33 38 L38 50 M30 46 L36 46" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 44 L56 44" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="2.5,2.5"/>
  </g>

  <!-- Brand name -->
  <text x="70" y="42" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#2D2D2D">Apan</text>

  <!-- Tagline -->
  <text x="70" y="60" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="500" fill="#A0A0A0" letter-spacing="3">YOUR OWN STORE</text>
</svg>

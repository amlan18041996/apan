<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E84142"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A6C"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#E84142" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="184" height="184" rx="40" ry="40" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Shopping bag -->
  <rect x="50" y="60" width="100" height="110" rx="16" ry="16" fill="#fff" opacity="0.95"/>

  <!-- Bag handle -->
  <path d="M68 60 V46 C68 34 80 26 100 26 C120 26 132 34 132 46 V60" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.95"/>

  <!-- 'A' letterform cutout on bag -->
  <path d="M80 118 L100 78 L120 118 M86 106 L114 106" fill="none" stroke="url(#bgGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Fold line -->
  <path d="M54 110 L146 110" fill="none" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Decorative dots -->
  <circle cx="130" cy="52" r="7" fill="url(#highlight)"/>
  <circle cx="152" cy="72" r="4" fill="#FFB088"/>
</svg>

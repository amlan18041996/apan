services:
  app:
    build:
      context: .
      target: production
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      typesense:
        condition: service_healthy

  typesense:
    image: typesense/typesense:27.1
    ports:
      - '8108:8108'
    volumes:
      - typesense-data:/data
    environment:
      TYPESENSE_API_KEY: ${NUXT_TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8108/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  typesense-data:

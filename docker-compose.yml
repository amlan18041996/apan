services:
  app:
    build:
      context: .
      target: base
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      typesense:
        condition: service_healthy

  typesense:
    image: typesense/typesense:27.1
    ports:
      - '8108:8108'
    volumes:
      - typesense-data:/data
    environment:
      TYPESENSE_API_KEY: ${NUXT_TYPESENSE_API_KEY:-typesense_dev_key}
      TYPESENSE_DATA_DIR: /data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8108/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  typesense-data:
